name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment target"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - production

jobs:
  deploy-backend:
    name: Deploy backend API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy dev backend
        if: github.event_name == 'workflow_dispatch' && inputs.environment == 'dev'
        run: flyctl deploy --config fly.dev.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Deploy production backend
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
        run: flyctl deploy --config fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-open-webui:
    name: Deploy Open WebUI
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy dev Open WebUI
        if: github.event_name == 'workflow_dispatch' && inputs.environment == 'dev'
        run: flyctl deploy --config open-webui/fly.dev.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Deploy production Open WebUI
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
        run: flyctl deploy --config open-webui/fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-frontend:
    name: Deploy React frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy dev React frontend
        if: github.event_name == 'workflow_dispatch' && inputs.environment == 'dev'
        working-directory: frontend
        run: flyctl deploy --config fly.dev.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Deploy production React frontend
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
        working-directory: frontend
        run: flyctl deploy --config fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
