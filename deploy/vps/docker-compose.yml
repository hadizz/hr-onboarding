# VPS production stack — Traefik on shared `zanbeel` network (Hetzner 65.109.205.51)
#
# Domains:
#   hr-api.xpotify.cc  → backend (FastAPI :8000)
#   hr.xpotify.cc      → React frontend
#   hr-db.xpotify.cc   → pgAdmin (Postgres UI)
#
# Prerequisites on VPS:
#   - Docker + Traefik already running (see /opt/zanbeel)
#   - External network: docker network create zanbeel  (if missing)
#   - /opt/hr-onboarding/.env with OPENAI_API_KEY, POSTGRES_*, PGADMIN_*

name: hr-onboarding

networks:
  zanbeel:
    external: true

services:
  postgres:
    image: postgres:16-alpine
    container_name: hr-onboarding-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-onboardai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-onboardai}
      POSTGRES_DB: ${POSTGRES_DB:-onboardai}
    volumes:
      - hr_onboarding_pg:/var/lib/postgresql/data
    networks:
      - zanbeel
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-onboardai} -d ${POSTGRES_DB:-onboardai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    container_name: hr-onboarding-backend
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-onboardai}:${POSTGRES_PASSWORD:-onboardai}@postgres:5432/${POSTGRES_DB:-onboardai}
      EVALS_RESULTS_DIR: /app/evals/results
    volumes:
      - hr_onboarding_data:/app/data
      - ../../seed-data:/app/seed-data:ro
      - ../../evals/results:/app/evals/results
    networks:
      - zanbeel
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=zanbeel
      - traefik.http.routers.hr-onboarding-api.rule=Host(`hr-api.xpotify.cc`)
      - traefik.http.routers.hr-onboarding-api.entrypoints=websecure
      - traefik.http.routers.hr-onboarding-api.tls=true
      - traefik.http.routers.hr-onboarding-api.tls.certresolver=letsencrypt
      - traefik.http.services.hr-onboarding-api.loadbalancer.server.port=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://hr-api.xpotify.cc
    container_name: hr-onboarding-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - zanbeel
    labels:
      - traefik.enable=true
      - traefik.docker.network=zanbeel
      - traefik.http.routers.hr-onboarding-web.rule=Host(`hr.xpotify.cc`)
      - traefik.http.routers.hr-onboarding-web.entrypoints=websecure
      - traefik.http.routers.hr-onboarding-web.tls=true
      - traefik.http.routers.hr-onboarding-web.tls.certresolver=letsencrypt
      - traefik.http.services.hr-onboarding-web.loadbalancer.server.port=80

  evals:
    profiles: ["evals"]
    build:
      context: ../..
      dockerfile: evals/Dockerfile
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-onboardai}:${POSTGRES_PASSWORD:-onboardai}@postgres:5432/${POSTGRES_DB:-onboardai}
      EVALS_RESULTS_DIR: /app/evals/results
    volumes:
      - ../../evals:/app/evals
      - ../../shared:/app/shared
      - hr_onboarding_data:/app/data
      - ../../seed-data:/app/seed-data:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zanbeel

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hr-onboarding-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@onboardai.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - hr_onboarding_pgadmin:/var/lib/pgadmin
      - ../../pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ../../pgadmin/pgpass:/pgpass:ro
    networks:
      - zanbeel
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=zanbeel
      - traefik.http.routers.hr-onboarding-db.rule=Host(`hr-db.xpotify.cc`)
      - traefik.http.routers.hr-onboarding-db.entrypoints=websecure
      - traefik.http.routers.hr-onboarding-db.tls=true
      - traefik.http.routers.hr-onboarding-db.tls.certresolver=letsencrypt
      - traefik.http.services.hr-onboarding-db.loadbalancer.server.port=80

volumes:
  hr_onboarding_data:
  hr_onboarding_pg:
  hr_onboarding_pgadmin:
