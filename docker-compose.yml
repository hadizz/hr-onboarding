services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./seed-data:/app/seed-data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  mcp-server:
    build:
      context: .
      dockerfile: mcp-server/Dockerfile
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./seed-data:/app/seed-data
    stdin_open: true
    tty: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.compose
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    environment:
      ENABLE_OLLAMA_API: "false"
      ENABLE_OPENAI_API: "true"
      OPENAI_API_BASE_URL: "http://backend:8000/v1"
      OPENAI_API_KEY: "${ONBOARDAI_API_KEY:-onboardai}"
      WEBUI_NAME: "OnboardAI"
      ENABLE_SIGNUP: "false"
      ENABLE_PERSISTENT_CONFIG: "false"
      WEBUI_SECRET_KEY: "${WEBUI_SECRET_KEY:-dev-secret}"
      WEBUI_ADMIN_EMAIL: "${WEBUI_ADMIN_EMAIL:-admin@example.com}"
      WEBUI_ADMIN_PASSWORD: "${WEBUI_ADMIN_PASSWORD:-admin}"
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      backend:
        condition: service_healthy

volumes:
  open-webui-data:
