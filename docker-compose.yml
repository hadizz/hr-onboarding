services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: onboardai
      POSTGRES_PASSWORD: onboardai
      POSTGRES_DB: onboardai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onboardai -d onboardai"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://onboardai:onboardai@postgres:5432/onboardai
    volumes:
      - ./data:/app/data
      - ./seed-data:/app/seed-data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  mcp-server:
    build:
      context: .
      dockerfile: mcp-server/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://onboardai:onboardai@postgres:5432/onboardai
    volumes:
      - ./data:/app/data
      - ./seed-data:/app/seed-data
    depends_on:
      postgres:
        condition: service_healthy
    stdin_open: true
    tty: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.compose
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

  adminer:
    image: adminer:4
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
