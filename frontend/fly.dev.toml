# Dev/staging React frontend — points at hr-onboarding-dev, not production.
app = "hr-onboarding-web-dev"
primary_region = "arn"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    VITE_API_URL = "https://hr-onboarding-dev.fly.dev"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
