server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # API calls go directly to https://hr-onboarding.fly.dev (set at build via VITE_API_URL).
    # No upstream proxy needed on Fly — backend is a separate app.

    location / {
        try_files $uri $uri/ /index.html;
    }
}
